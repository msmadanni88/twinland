<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TwinLand — کشف کافه‌های تهران</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#F5F5F7;--card:#fff;--border:#E5E5EA;--text:#1C1C1E;--sub:#6E6E73;--accent:#FF6B35;--chip:#EFEFF4}
body{font-family:'Vazirmatn',system-ui,sans-serif;direction:rtl;background:var(--bg);height:100dvh;overflow:hidden;display:flex;flex-direction:column;position:fixed;inset:0}
::-webkit-scrollbar{display:none}
button{cursor:pointer;font-family:inherit;transition:opacity .15s}
button:active{opacity:.7}
input{outline:none;font-family:inherit}
input::placeholder{color:#AEAEB2}
.leaflet-container{background:#E8E8E8!important}
.leaflet-control-attribution{display:none!important}
.leaflet-control-zoom{display:none!important}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* TOPBAR */
#topbar{height:54px;flex-shrink:0;background:rgba(255,255,255,.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 12px;display:flex;align-items:center;gap:8;z-index:200;box-shadow:0 1px 0 rgba(0,0,0,.06)}
#logo{font-size:18px;font-weight:900;color:var(--text);flex-shrink:0;letter-spacing:-.5px;white-space:nowrap}
#logo span{color:var(--accent)}
#search-input{flex:1;background:var(--chip);border:1.5px solid transparent;border-radius:10px;padding:7px 12px;font-size:12px;color:var(--text);transition:border-color .2s}
#search-input:focus{border-color:var(--accent)}
#btn-mode{background:var(--chip);border:none;border-radius:10px;padding:0 10px;height:36px;font-size:12px;color:var(--accent);font-weight:700;flex-shrink:0;white-space:nowrap}
#btn-city{background:var(--accent);border:none;border-radius:10px;padding:0 11px;height:36px;font-size:12px;color:#fff;font-weight:700;flex-shrink:0;white-space:nowrap}
#btn-menu{background:var(--chip);border:none;border-radius:10px;width:36px;height:36px;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--text)}

/* FILTER */
#filterbar{height:38px;flex-shrink:0;display:flex;align-items:center;gap:6px;padding:0 12px;overflow-x:auto;background:rgba(255,255,255,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.fchip{flex-shrink:0;background:var(--chip);border:none;border-radius:99px;padding:4px 13px;font-size:11px;color:var(--text);white-space:nowrap;font-weight:400}
.fchip.active{background:var(--accent);color:#fff;font-weight:700}

/* MAP */
#main{flex:1;position:relative;overflow:hidden;min-height:0}
#map{position:absolute;inset:0;z-index:1}
#live-pill{position:absolute;top:10px;right:10px;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:99px;padding:5px 13px;display:flex;gap:8px;align-items:center;font-size:11px;color:var(--sub);box-shadow:0 2px 8px rgba(0,0,0,.08)}
#live-pill strong{color:var(--text);font-weight:700}
.live-dot{color:#34C759;font-size:8px}

/* NAV Controls */
#nav-controls{position:absolute;bottom:14px;left:12px;z-index:10;display:flex;flex-direction:column;gap:5px}
.compass{display:grid;grid-template-columns:repeat(3,32px);gap:3px}
.nav-btn{background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:9px;width:32px;height:32px;font-size:15px;color:var(--text);font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.nav-btn.center{font-size:10px}
.zoom-row{display:flex;gap:3px}
.zoom-btn{background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:9px;width:32px;height:32px;font-size:18px;color:var(--text);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.1)}

#btn-panel{position:absolute;bottom:14px;right:12px;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;padding:8px 14px;font-size:12px;font-weight:600;color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.12);display:flex;align-items:center;gap:5px}
#btn-panel.open{background:var(--accent);border-color:var(--accent);color:#fff}

/* PANEL */
#panel{position:absolute;bottom:0;left:0;right:0;height:52%;z-index:50;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-radius:20px 20px 0 0;border:1px solid var(--border);border-bottom:none;display:none;flex-direction:column;animation:slideUp .3s ease}
#panel.open{display:flex}
#panel-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:10px auto 0;flex-shrink:0;cursor:pointer}
#panel-content{flex:1;overflow-y:auto}
.panel-section{padding:14px;border-top:1px solid var(--border)}
.panel-section:first-child{border-top:none}
.section-title{font-size:10px;color:var(--sub);letter-spacing:.8px;margin-bottom:8px;font-weight:600;text-transform:uppercase}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.stat-card{background:var(--chip);border-radius:10px;padding:9px 10px}
.stat-icon{font-size:15px}
.stat-val{font-size:17px;font-weight:800;color:var(--text);margin-top:2px}
.stat-lbl{font-size:9px;color:var(--sub);margin-top:1px}
.filter-btn{width:100%;display:flex;align-items:center;gap:10px;background:transparent;border:none;padding:8px 4px;border-radius:8px;color:var(--text);font-size:13px;font-weight:500;text-align:right}
.filter-btn .fi{font-size:17px;width:24px;text-align:center}
.event-card{background:#FFF9F0;border:1px solid #FFE0B2;border-radius:14px;padding:12px}
.event-title{font-size:13px;font-weight:800;color:var(--text);margin-top:6px}
.event-sub{font-size:11px;color:var(--sub);margin-top:3px;line-height:1.5}
.event-btn{margin-top:10px;width:100%;background:var(--accent);border:none;border-radius:10px;padding:8px;font-size:12px;color:#fff;font-weight:700}
.cafe-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.cafe-row-name{font-size:12px;font-weight:700;color:var(--text)}
.cafe-row-sub{font-size:10px;color:var(--sub)}
.cafe-live{font-size:11px;color:#34C759;font-weight:700}

/* BOTTOM NAV */
#bottomnav{height:62px;flex-shrink:0;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:stretch;box-shadow:0 -1px 0 rgba(0,0,0,.06)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--sub);font-size:10px;padding:8px 0;position:relative;font-weight:400}
.nb span{font-size:22px}
.nb.active{color:var(--accent);font-weight:700}
.nb.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2.5px;background:var(--accent);border-radius:2px 2px 0 0}

/* POPUP overlay */
.overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);display:none}
.overlay.open{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:1001;background:var(--card);border-radius:24px 24px 0 0;border:1px solid var(--border);border-bottom:none;max-height:90dvh;overflow-y:auto;animation:slideUp .3s ease}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:14px auto}

/* CAFE SHEET */
.cafe-header{padding:0 18px 16px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border)}
.cafe-icon{width:58px;height:58px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.cafe-name{font-size:18px;font-weight:800;color:var(--text)}
.cafe-addr{font-size:12px;color:var(--accent);margin-top:3px}
.cafe-stars{color:#FF9500;font-size:14px;margin-top:3px}
.cafe-live-big{font-size:24px;font-weight:800;color:#34C759;text-align:center}
.cafe-live-lbl{font-size:9px;color:var(--sub);text-align:center;margin-top:1px}
.cafe-body{padding:16px 18px}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.tag{background:var(--chip);border-radius:99px;font-size:11px;color:var(--text);padding:3px 11px;font-weight:500}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-mini{background:var(--chip);border-radius:12px;padding:10px 6px;text-align:center}
.stat-mini .si{font-size:18px}
.stat-mini .sv{font-size:13px;font-weight:700;color:var(--text);margin-top:4px}
.stat-mini .sl{font-size:9px;color:var(--sub);margin-top:2px}
.reactions{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px}
.react-btn{background:var(--chip);border:1.5px solid transparent;border-radius:12px;padding:9px 4px;display:flex;flex-direction:column;align-items:center;gap:3px}
.react-btn.on{background:#FF6B3518;border-color:var(--accent)}
.react-btn .ri{font-size:20px}
.react-btn .rl{font-size:9px;color:var(--sub);font-weight:400}
.react-btn.on .rl{color:var(--accent);font-weight:700}
.actions{display:flex;gap:10px}
.btn-checkin{flex:1;background:var(--accent);color:#fff;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:700;box-shadow:0 4px 16px rgba(255,107,53,.4)}
.btn-maps{background:var(--chip);border:1px solid var(--border);border-radius:14px;padding:14px 16px;font-size:20px;text-decoration:none;display:flex;align-items:center}
.asset-card{background:#FFF9F0;border:1px solid #FFE0B2;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:14px}
.asset-title{font-size:12px;font-weight:700;color:#E65100}
.asset-sub{font-size:11px;color:var(--sub);margin-top:2px}

/* MENU */
#menu-overlay{position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.3);backdrop-filter:blur(8px);display:none}
#menu-overlay.open{display:block}
#menu-box{position:fixed;top:62px;right:14px;left:14px;z-index:3001;background:rgba(255,255,255,.96);backdrop-filter:blur(24px);border-radius:18px;border:1px solid var(--border);overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.15);animation:fadeIn .2s ease}
.menu-item{width:100%;display:flex;align-items:center;gap:14px;background:transparent;border:none;padding:13px 18px;color:var(--text);font-size:14px;font-weight:500;border-bottom:1px solid var(--border);text-align:right}
.menu-item:last-child{border-bottom:none}
.menu-item .mi{font-size:20px;width:28px;text-align:center}

/* CITY/MODE pickers */
.picker-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.4);backdrop-filter:blur(10px);display:none;align-items:flex-end;justify-content:center}
.picker-overlay.open{display:flex}
.picker-sheet{background:var(--card);border-radius:24px 24px 0 0;padding:20px 20px 44px;width:100%;max-width:540px;border:1px solid var(--border);border-bottom:none;animation:slideUp .3s ease;max-height:75dvh;overflow-y:auto}
.picker-title{font-size:17px;font-weight:800;color:var(--text);text-align:center;margin-bottom:16px}
.city-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.city-btn{background:var(--chip);border:none;border-radius:12px;padding:12px 6px;font-size:12px;font-weight:500;color:var(--text);font-family:inherit}
.city-btn.active{background:var(--accent);color:#fff;font-weight:800}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mode-btn{background:var(--chip);border:none;border-radius:14px;padding:16px;font-size:14px;font-weight:500;color:var(--text);font-family:inherit}
.mode-btn.active{background:var(--accent);color:#fff;font-weight:800}

/* TOAST */
#toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);z-index:4000;background:var(--text);color:#fff;border-radius:99px;padding:10px 22px;font-size:13px;font-weight:600;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2);display:none;animation:fadeUp .2s ease}
</style>
</head>
<body>

<div id="topbar">
  <button id="btn-menu" onclick="toggleMenu()">☰</button>
  <div id="logo">🏙️ Twin<span>Land</span></div>
  <input id="search-input" type="text" placeholder="🔍 جستجو..." oninput="onSearch(this.value)">
  <button id="btn-mode" onclick="openMode()">🗺</button>
  <button id="btn-city" onclick="openCity()">تهران ▾</button>
</div>

<div id="filterbar">
  <button class="fchip active" onclick="setZone('all',this)">همه</button>
  <button class="fchip" onclick="setZone('north',this)">⬆ شمال</button>
  <button class="fchip" onclick="setZone('center',this)">⬛ مرکز</button>
  <button class="fchip" onclick="setZone('east',this)">➡ شرق</button>
  <button class="fchip" onclick="setZone('west',this)">⬅ غرب</button>
  <button class="fchip" onclick="setZone('top',this)">⭐ برتر</button>
</div>

<div id="main">
  <div id="map"></div>

  <div id="live-pill">
    <strong>☕ <span id="pill-count">0</span></strong>
    <span style="color:var(--border)">|</span>
    <span class="live-dot">●</span>
    <span id="pill-live">0</span> نفر
  </div>

  <div id="nav-controls">
    <div class="compass">
      <div></div>
      <button class="nav-btn" onclick="panMap(0,-80)">↑</button>
      <div></div>
      <button class="nav-btn" onclick="panMap(80,0)">←</button>
      <button class="nav-btn center" onclick="resetView()">⌖</button>
      <button class="nav-btn" onclick="panMap(-80,0)">→</button>
      <div></div>
      <button class="nav-btn" onclick="panMap(0,80)">↓</button>
      <div></div>
    </div>
    <div class="zoom-row">
      <button class="zoom-btn" onclick="MAP.zoomIn()">＋</button>
      <button class="zoom-btn" onclick="MAP.zoomOut()">－</button>
    </div>
  </div>

  <button id="btn-panel" onclick="togglePanel()">📊 داشبورد</button>

  <div id="panel">
    <div id="panel-handle" onclick="togglePanel()"></div>
    <div id="panel-content">
      <div class="panel-section">
        <div class="section-title">آمار زنده</div>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-icon">☕</div><div class="stat-val" id="ps-cafes">0</div><div class="stat-lbl">کافه</div></div>
          <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-val" id="ps-live">0</div><div class="stat-lbl">آنلاین</div></div>
          <div class="stat-card"><div class="stat-icon">⭐</div><div class="stat-val" id="ps-top">0</div><div class="stat-lbl">برتر</div></div>
          <div class="stat-card"><div class="stat-icon">🔍</div><div class="stat-val" id="ps-filter">0</div><div class="stat-lbl">نمایش</div></div>
        </div>
      </div>
      <div class="panel-section">
        <div class="section-title">فیلتر سریع</div>
        <button class="filter-btn" onclick="quickFilter('صبحانه')"><span class="fi">🌅</span>صبحانه</button>
        <button class="filter-btn" onclick="quickFilter('شبانه')"><span class="fi">🌙</span>شبانه</button>
        <button class="filter-btn" onclick="quickFilter('کتاب')"><span class="fi">📚</span>کتاب</button>
        <button class="filter-btn" onclick="quickFilter('موسیقی')"><span class="fi">🎵</span>موسیقی</button>
        <button class="filter-btn" onclick="quickFilter('دنج')"><span class="fi">🛋</span>دنج</button>
        <button class="filter-btn" onclick="quickFilter('اسپشالتی')"><span class="fi">☕</span>اسپشالتی</button>
      </div>
      <div class="panel-section">
        <div class="section-title">رویداد فعال</div>
        <div class="event-card">
          <div style="font-size:24px">⚔️</div>
          <div class="event-title">شمشیر گریفیندور</div>
          <div class="event-sub">کافه‌های غرب تهران • امروز</div>
          <button class="event-btn" onclick="showToast('🎮 ورود به رویداد...')">شرکت در رویداد</button>
        </div>
      </div>
      <div class="panel-section">
        <div class="section-title">پرطرفدارترین‌ها</div>
        <div id="top-cafes"></div>
      </div>
    </div>
  </div>
</div>

<div id="bottomnav">
  <button class="nb active" onclick="setTab(this,'map')"><span>🗺</span>نقشه</button>
  <button class="nb" onclick="setTab(this,'missions')"><span>📋</span>ماموریت</button>
  <button class="nb" onclick="setTab(this,'clan')"><span>🛡</span>کلن</button>
  <button class="nb" onclick="setTab(this,'rank')"><span>🏆</span>رتبه</button>
  <button class="nb" onclick="setTab(this,'profile')"><span>👤</span>پروفایل</button>
</div>

<!-- CAFE POPUP -->
<div id="cafe-overlay" class="overlay" onclick="closeCafe()"></div>
<div id="cafe-sheet" class="sheet" style="display:none">
  <div class="sheet-handle"></div>
  <div class="cafe-header">
    <div class="cafe-icon" id="cafe-icon-el">☕</div>
    <div style="flex:1">
      <div class="cafe-name" id="cafe-name-el"></div>
      <div class="cafe-addr" id="cafe-addr-el"></div>
      <div class="cafe-stars" id="cafe-stars-el"></div>
    </div>
    <div>
      <div class="cafe-live-big" id="cafe-live-el">0</div>
      <div class="cafe-live-lbl">الان اینجا</div>
    </div>
  </div>
  <div class="cafe-body">
    <div class="tags" id="cafe-tags-el"></div>
    <div id="cafe-asset-el"></div>
    <div class="stats-row">
      <div class="stat-mini"><div class="si">☕</div><div class="sv" id="cafe-xp-el">+20 XP</div><div class="sl">چک‌این</div></div>
      <div class="stat-mini"><div class="si">⏰</div><div class="sv">۸ص–۱۰ش</div><div class="sl">ساعات</div></div>
      <div class="stat-mini"><div class="si">🏅</div><div class="sv" id="cafe-rank-el">نقره</div><div class="sl">رتبه</div></div>
    </div>
    <div class="reactions">
      <button class="react-btn" id="btn-like" onclick="toggleReact('like')"><span class="ri">👍</span><span class="rl">لایک</span></button>
      <button class="react-btn" id="btn-love" onclick="toggleReact('love')"><span class="ri">❤️</span><span class="rl">عشق</span></button>
      <button class="react-btn" id="btn-fav"  onclick="toggleReact('fav')"><span class="ri">🔖</span><span class="rl">ذخیره</span></button>
      <button class="react-btn" onclick="showToast('🔗 لینک کپی شد!')"><span class="ri">📤</span><span class="rl">اشتراک</span></button>
    </div>
    <div class="actions">
      <button class="btn-checkin" onclick="doCheckin()">📍 چک‌این</button>
      <a class="btn-maps" id="cafe-maps-el" href="#" target="_blank">🗺</a>
    </div>
  </div>
</div>

<!-- MENU -->
<div id="menu-overlay" onclick="closeMenu()"></div>
<div id="menu-box" style="display:none">
  <button class="menu-item" onclick="closeMenu()"><span class="mi">🗺</span>نقشه</button>
  <button class="menu-item" onclick="closeMenu();showToast('📣 رویداد‌ها به زودی!')"><span class="mi">🎮</span>رویداد‌ها</button>
  <button class="menu-item" onclick="closeMenu();showToast('📣 کلن‌ها به زودی!')"><span class="mi">🛡</span>کلن‌ها</button>
  <button class="menu-item" onclick="closeMenu();showToast('📣 رتبه‌بندی به زودی!')"><span class="mi">🏆</span>رتبه‌بندی</button>
  <button class="menu-item" onclick="closeMenu();showToast('📣 چت زنده به زودی!')"><span class="mi">💬</span>چت زنده</button>
  <button class="menu-item" onclick="closeMenu();showToast('📣 علاقه‌مندی‌ها به زودی!')"><span class="mi">❤️</span>علاقه‌مندی‌ها</button>
  <button class="menu-item" onclick="closeMenu();showToast('📣 تنظیمات به زودی!')"><span class="mi">⚙️</span>تنظیمات</button>
  <button class="menu-item" onclick="closeMenu();showToast('📣 پروفایل به زودی!')"><span class="mi">👤</span>پروفایل</button>
</div>

<!-- CITY PICKER -->
<div id="city-overlay" class="picker-overlay" onclick="closeCity()">
  <div class="picker-sheet" onclick="event.stopPropagation()">
    <div style="width:40px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 18px"></div>
    <div class="picker-title">🏙️ انتخاب شهر</div>
    <div class="city-grid" id="city-grid"></div>
  </div>
</div>

<!-- MAP MODE PICKER -->
<div id="mode-overlay" class="picker-overlay" onclick="closeMode()">
  <div class="picker-sheet" onclick="event.stopPropagation()">
    <div style="width:40px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 18px"></div>
    <div class="picker-title">🎨 استایل نقشه</div>
    <div class="mode-grid" id="mode-grid"></div>
  </div>
</div>

<div id="toast"></div>

<script>
var SB_URL = 'https://pkkdepecbzrnmejnseqg.supabase.co'
var SB_KEY = 'sb_publishable_g2Qy4sXwgvYPchIU3aB4ew_JTvP1PId'

var CITIES = {
  tehran:     {name:'تهران',     lat:35.7219,lng:51.3979,zoom:12},
  mashhad:    {name:'مشهد',      lat:36.2972,lng:59.6067,zoom:12},
  isfahan:    {name:'اصفهان',    lat:32.6539,lng:51.6660,zoom:12},
  shiraz:     {name:'شیراز',     lat:29.5918,lng:52.5837,zoom:12},
  tabriz:     {name:'تبریز',     lat:38.0962,lng:46.2738,zoom:12},
  karaj:      {name:'کرج',       lat:35.8400,lng:50.9391,zoom:12},
  rasht:      {name:'رشت',       lat:37.2809,lng:49.5831,zoom:12},
  gorgan:     {name:'گرگان',     lat:36.8468,lng:54.4430,zoom:12},
  kerman:     {name:'کرمان',     lat:30.2839,lng:57.0834,zoom:12},
  kish:       {name:'کیش',       lat:26.5267,lng:53.9800,zoom:13},
  urmia:      {name:'ارومیه',    lat:37.5527,lng:45.0761,zoom:12},
  hamadan:    {name:'همدان',     lat:34.7993,lng:48.5146,zoom:12},
  ahvaz:      {name:'اهواز',     lat:31.3183,lng:48.6706,zoom:12},
  kermanshah: {name:'کرمانشاه',  lat:34.3142,lng:47.0650,zoom:12},
  qom:        {name:'قم',        lat:34.6401,lng:50.8764,zoom:12},
  arak:       {name:'اراک',      lat:34.0917,lng:49.6892,zoom:12},
}

var MAP_MODES = [
  {key:'normal',  label:'🗺 معمولی', filter:'none'},
  {key:'game',    label:'🎮 گیم',    filter:'saturate(1.8) contrast(1.1) hue-rotate(10deg) brightness(0.9)'},
  {key:'dark',    label:'🌙 تاریک',  filter:'brightness(0.3) saturate(0.4)'},
  {key:'cartoon', label:'🎨 کارتون', filter:'saturate(2.2) contrast(1.25) brightness(1.05)'},
]

var COLORS = ['#FF6B35','#E84393','#7C3AED','#0EA5E9','#10B981','#F59E0B','#EF4444','#8B5CF6']

var MAP = null
var markers = {}
var cafes = []
var liveData = {}
var currentCity = 'tehran'
var currentMode = 'normal'
var currentZone = 'all'
var currentSearch = ''
var selCafe = null
var reactions = {like:new Set(), love:new Set(), fav:new Set()}

function getColor(name) {
  var h = 0
  for (var i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h)
  return COLORS[Math.abs(h) % COLORS.length]
}

// Init map
window.addEventListener('load', function() {
  var c = CITIES[currentCity]
  MAP = L.map('map', {center:[c.lat,c.lng], zoom:c.zoom, zoomControl:false, attributionControl:false})
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19}).addTo(MAP)
  loadCafes()
  buildCityGrid()
  buildModeGrid()
})

function loadCafes() {
  fetch(SB_URL + '/rest/v1/cafes?select=*&is_active=eq.true', {
    headers: {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY}
  }).then(function(r){return r.json()}).then(function(d){
    if (Array.isArray(d)) {
      cafes = d
      addMarkers()
      updateLive()
      setInterval(updateLive, 3000)
      updatePanelStats()
      buildTopCafes()
    }
  }).catch(function(){})
}

function addMarkers() {
  cafes.forEach(function(cafe) {
    var color = getColor(cafe.name)
    var n = liveData[cafe.id] || 0
    var html = '<div style="position:relative;width:42px;height:50px;cursor:pointer">'
      + '<div style="background:'+color+';border:3px solid white;border-radius:50% 50% 50% 0;'
      + 'transform:rotate(-45deg);width:38px;height:38px;'
      + 'display:flex;align-items:center;justify-content:center;'
      + 'box-shadow:0 4px 14px '+color+'88">'
      + '<span style="transform:rotate(45deg);font-size:17px">☕</span>'
      + '</div>'
      + (cafe.is_top ? '<div style="position:absolute;top:-8px;right:-2px;font-size:13px">⚔️</div>' : '')
      + '<div id="lv-'+cafe.id+'" style="position:absolute;top:-5px;left:-3px;'
      + 'background:#FF3B30;color:white;border:2px solid white;border-radius:99px;'
      + 'font-size:9px;font-weight:800;min-width:17px;height:17px;'
      + 'display:'+(n>0?'flex':'none')+';align-items:center;justify-content:center;padding:0 3px">'+(n>0?n:'')+'</div>'
      + '</div>'
    var icon = L.divIcon({html:html, iconSize:[42,50], iconAnchor:[21,50], className:''})
    var mk = L.marker([cafe.lat, cafe.lng], {icon:icon})
    mk.on('click', function(){ openCafe(cafe) })
    mk.addTo(MAP)
    markers[cafe.id] = mk
  })
  document.getElementById('pill-count').textContent = cafes.length
  document.getElementById('ps-cafes').textContent = cafes.length
  document.getElementById('ps-top').textContent = cafes.filter(function(c){return c.is_top}).length
  document.getElementById('ps-filter').textContent = cafes.length
}

function updateLive() {
  var total = 0
  cafes.forEach(function(cafe) {
    var n = Math.floor(Math.random() * 14)
    liveData[cafe.id] = n
    total += n
    var el = document.getElementById('lv-'+cafe.id)
    if (el) {
      el.textContent = n > 0 ? n : ''
      el.style.display = n > 0 ? 'flex' : 'none'
    }
    var lel = document.getElementById('cl-'+cafe.id)
    if (lel) lel.textContent = n + ' نفر'
  })
  document.getElementById('pill-live').textContent = total
  document.getElementById('ps-live').textContent = total
  if (selCafe) document.getElementById('cafe-live-el').textContent = liveData[selCafe.id] || 0
}

function filterMarkers() {
  var filtered = cafes.filter(function(c) {
    var zOk = currentZone === 'all' || c.zone === currentZone || (currentZone === 'top' && c.is_top)
    var sOk = !currentSearch || c.name.includes(currentSearch)
    return zOk && sOk
  })
  cafes.forEach(function(c) {
    var mk = markers[c.id]
    if (!mk) return
    var show = filtered.find(function(f){return f.id === c.id})
    try {
      if (show) { if (!MAP.hasLayer(mk)) mk.addTo(MAP) }
      else MAP.removeLayer(mk)
    } catch(e){}
  })
  document.getElementById('pill-count').textContent = filtered.length
  document.getElementById('ps-filter').textContent = filtered.length
}

function setZone(zone, btn) {
  currentZone = zone
  document.querySelectorAll('.fchip').forEach(function(b){b.classList.remove('active')})
  btn.classList.add('active')
  var coords = {north:[35.766,51.41,13], center:[35.703,51.41,13], east:[35.721,51.50,13], west:[35.728,51.34,13]}
  if (coords[zone]) MAP.flyTo([coords[zone][0],coords[zone][1]], coords[zone][2])
  else resetView()
  filterMarkers()
}

function onSearch(val) {
  currentSearch = val
  filterMarkers()
}

function quickFilter(tag) {
  currentSearch = tag
  document.getElementById('search-input').value = tag
  filterMarkers()
  showToast('🔍 ' + tag)
}

function panMap(x, y) { MAP.panBy([x,y], {animate:true}) }
function resetView() {
  var c = CITIES[currentCity]
  MAP.flyTo([c.lat,c.lng], c.zoom, {duration:0.8})
}

// CITY
function buildCityGrid() {
  var grid = document.getElementById('city-grid')
  grid.innerHTML = ''
  Object.entries(CITIES).forEach(function(entry) {
    var k = entry[0], v = entry[1]
    var btn = document.createElement('button')
    btn.className = 'city-btn' + (k === currentCity ? ' active' : '')
    btn.textContent = v.name
    btn.onclick = function() {
      currentCity = k
      document.getElementById('btn-city').textContent = v.name + ' ▾'
      MAP.flyTo([v.lat,v.lng], v.zoom, {duration:1})
      document.querySelectorAll('.city-btn').forEach(function(b){b.classList.remove('active')})
      btn.classList.add('active')
      closeCity()
      showToast('✈️ ' + v.name)
    }
    grid.appendChild(btn)
  })
}

function openCity() { document.getElementById('city-overlay').classList.add('open') }
function closeCity() { document.getElementById('city-overlay').classList.remove('open') }

// MAP MODE
function buildModeGrid() {
  var grid = document.getElementById('mode-grid')
  grid.innerHTML = ''
  MAP_MODES.forEach(function(m) {
    var btn = document.createElement('button')
    btn.className = 'mode-btn' + (m.key === currentMode ? ' active' : '')
    btn.textContent = m.label
    btn.onclick = function() {
      currentMode = m.key
      var pane = document.querySelector('.leaflet-tile-pane')
      if (pane) pane.style.filter = m.filter
      document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.remove('active')})
      btn.classList.add('active')
      document.getElementById('btn-mode').textContent = m.label.split(' ')[0]
      closeMode()
      showToast(m.label + ' فعال شد')
    }
    grid.appendChild(btn)
  })
}

function openMode() { document.getElementById('mode-overlay').classList.add('open') }
function closeMode() { document.getElementById('mode-overlay').classList.remove('open') }

// PANEL
function togglePanel() {
  var panel = document.getElementById('panel')
  var btn = document.getElementById('btn-panel')
  var open = panel.classList.toggle('open')
  btn.classList.toggle('open', open)
  btn.textContent = open ? '📊 داشبورد ✕' : '📊 داشبورد'
}

function updatePanelStats() {
  document.getElementById('ps-cafes').textContent = cafes.length
  document.getElementById('ps-top').textContent = cafes.filter(function(c){return c.is_top}).length
}

function buildTopCafes() {
  var el = document.getElementById('top-cafes')
  el.innerHTML = ''
  cafes.filter(function(c){return c.is_top}).slice(0,5).forEach(function(c) {
    el.innerHTML += '<div class="cafe-row">'
      + '<span style="font-size:20px">☕</span>'
      + '<div style="flex:1"><div class="cafe-row-name">'+c.name+'</div><div class="cafe-row-sub">'+c.description+'</div></div>'
      + '<div class="cafe-live" id="cl-'+c.id+'">'+(liveData[c.id]||0)+' نفر</div>'
      + '</div>'
  })
}

// CAFE POPUP
function openCafe(cafe) {
  selCafe = cafe
  var color = getColor(cafe.name)
  document.getElementById('cafe-icon-el').style.background = color + '18'
  document.getElementById('cafe-icon-el').style.border = '2px solid ' + color + '44'
  document.getElementById('cafe-name-el').textContent = cafe.name
  document.getElementById('cafe-addr-el').textContent = '📍 ' + (cafe.description || '')
  document.getElementById('cafe-stars-el').textContent = cafe.is_top ? '★★★★★' : '★★★☆☆'
  document.getElementById('cafe-live-el').textContent = liveData[cafe.id] || 0
  document.getElementById('cafe-xp-el').textContent = '+' + (cafe.is_top ? 30 : 20) + ' XP'
  document.getElementById('cafe-rank-el').textContent = cafe.is_top ? 'طلایی' : 'نقره'
  document.getElementById('cafe-maps-el').href = 'https://www.google.com/maps?q=' + cafe.lat + ',' + cafe.lng

  var tagsEl = document.getElementById('cafe-tags-el')
  tagsEl.innerHTML = ''
  if (cafe.tags) cafe.tags.forEach(function(t) {
    tagsEl.innerHTML += '<span class="tag">'+t+'</span>'
  })

  var assetEl = document.getElementById('cafe-asset-el')
  assetEl.innerHTML = cafe.is_top
    ? '<div class="asset-card"><span style="font-size:26px">⚔️</span><div><div class="asset-title">آیتم: شمشیر گریفیندور</div><div class="asset-sub">با سفارش ۱۰۰,۰۰۰ تومان شانس دریافت داری</div></div></div>'
    : ''

  updateReactBtns()

  document.getElementById('cafe-overlay').classList.add('open')
  document.getElementById('cafe-sheet').style.display = 'block'
  document.getElementById('cafe-sheet').style.animation = 'slideUp .3s ease'
}

function closeCafe() {
  document.getElementById('cafe-overlay').classList.remove('open')
  document.getElementById('cafe-sheet').style.display = 'none'
  selCafe = null
}

function doCheckin() {
  if (!selCafe) return
  var xp = selCafe.is_top ? 30 : 20
  showToast('✅ چک‌این! +' + xp + ' XP')
  closeCafe()
}

function toggleReact(type) {
  if (!selCafe) return
  var set = reactions[type]
  var id = selCafe.id
  if (set.has(id)) { set.delete(id); showToast('حذف شد') }
  else { set.add(id); showToast({like:'👍',love:'❤️',fav:'🔖'}[type] + ' ثبت شد') }
  updateReactBtns()
}

function updateReactBtns() {
  if (!selCafe) return
  var id = selCafe.id
  ;[['like','btn-like'],['love','btn-love'],['fav','btn-fav']].forEach(function(pair) {
    var btn = document.getElementById(pair[1])
    if (reactions[pair[0]].has(id)) btn.classList.add('on')
    else btn.classList.remove('on')
  })
}

// MENU
function toggleMenu() {
  var box = document.getElementById('menu-box')
  var ov = document.getElementById('menu-overlay')
  var open = box.style.display === 'none' || !box.style.display
  box.style.display = open ? 'block' : 'none'
  ov.classList.toggle('open', open)
}
function closeMenu() {
  document.getElementById('menu-box').style.display = 'none'
  document.getElementById('menu-overlay').classList.remove('open')
}

// TAB
function setTab(btn, key) {
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('active')})
  btn.classList.add('active')
  if (key !== 'map') showToast('📣 ' + btn.textContent.trim().replace(/\S+\s*/,'') + ' به زودی!')
}

// TOAST
var toastTimer = null
function showToast(msg) {
  var el = document.getElementById('toast')
  el.textContent = msg
  el.style.display = 'block'
  clearTimeout(toastTimer)
  toastTimer = setTimeout(function(){ el.style.display = 'none' }, 2500)
}
</script>
</body>
</html>
